<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="gate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <!-- Torii Gate -->
  <g transform="translate(96,96)">
    <!-- Pillars -->
    <rect x="-45" y="-20" width="10" height="60" fill="url(#gate)" rx="2"/>
    <rect x="35" y="-20" width="10" height="60" fill="url(#gate)" rx="2"/>
    <!-- Top beam -->
    <rect x="-55" y="-30" width="110" height="10" fill="url(#gate)" rx="3"/>
    <!-- Second beam -->
    <rect x="-48" y="-18" width="96" height="7" fill="url(#gate)" rx="2"/>
    <!-- Roof overhang -->
    <path d="M-60,-30 L0,-45 L60,-30" fill="none" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>
    <!-- Glow -->
    <circle cx="0" cy="5" r="15" fill="#6366f1" opacity="0.3"/>
    <text x="0" y="12" text-anchor="middle" font-size="20" font-weight="bold" fill="#6366f1" font-family="sans-serif">道</text>
  </g>
</svg>
