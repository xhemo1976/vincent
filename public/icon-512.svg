<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="gate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Torii Gate -->
  <g transform="translate(256,240)">
    <!-- Pillars -->
    <rect x="-110" y="-50" width="24" height="160" fill="url(#gate)" rx="4"/>
    <rect x="86" y="-50" width="24" height="160" fill="url(#gate)" rx="4"/>
    <!-- Top beam -->
    <rect x="-135" y="-75" width="270" height="24" fill="url(#gate)" rx="6"/>
    <!-- Second beam -->
    <rect x="-115" y="-45" width="230" height="16" fill="url(#gate)" rx="4"/>
    <!-- Roof overhang -->
    <path d="M-145,-75 L0,-110 L145,-75" fill="none" stroke="#e74c3c" stroke-width="12" stroke-linecap="round"/>
    <!-- Inner glow -->
    <circle cx="0" cy="20" r="40" fill="#6366f1" opacity="0.2" filter="url(#glow)"/>
    <text x="0" y="35" text-anchor="middle" font-size="52" font-weight="bold" fill="#6366f1" font-family="sans-serif" filter="url(#glow)">道</text>
  </g>
  <!-- App name -->
  <text x="256" y="420" text-anchor="middle" font-size="48" font-weight="bold" fill="white" font-family="sans-serif" letter-spacing="6">SHIN DOJO</text>
</svg>
